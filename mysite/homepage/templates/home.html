<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gentle Space</title>
    <style>
        :root {
            --bg: #fdfbfb;
            --text: #4a4a4a;
            --accent: #b5a897;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        /* Animated Zen Background */
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #f7f3f0, #e0ddd5, #fdfbfb, #ebedee);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text);
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Welcome Screen Styling */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--white);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1s ease, visibility 1s;
        }

        #main-content {
            display: none; max-width: 900px; margin: 0 auto;
            padding: 5vh 20px; text-align: center;
        }

        /* Improved Input Container */
        .input-container {
            background: var(--white); padding: 40px;
            border-radius: 20px; box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
        }

        textarea {
            width: 100%; height: 120px; border: none; padding: 15px;
            font-size: 1.1rem; resize: none; outline: none;
            background: #fcfcfc; border-radius: 10px; margin-bottom: 20px;
        }

        .submit-btn, .enter-btn {
            padding: 14px 45px; border-radius: 30px; border: 1px solid var(--accent);
            background: var(--accent); color: white; cursor: pointer;
            letter-spacing: 1px; transition: all 0.3s ease; text-decoration: none;
            font-weight: 500;
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--shadow); }

        /* Sticky Note Wall Grid */
        .wall-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; margin-top: 60px; padding-bottom: 50px;
        }

        /* The Sticky Note Look */
        .note {
            background: #fffeb7; padding: 25px;
            box-shadow: 5px 5px 15px var(--shadow);
            text-align: left; position: relative;
            transition: transform 0.3s ease;
            min-height: 180px; display: flex; flex-direction: column;
            justify-content: space-between;
        }

        /* Random Rotation for Sticky Notes */
        .note:nth-child(odd) { transform: rotate(-2deg); background: #ffebef; }
        .note:nth-child(even) { transform: rotate(2deg); background: #e3f2fd; }
        .note:nth-child(3n) { transform: rotate(1.5deg); background: #f0f4c3; }

        .note:hover { transform: scale(1.05) rotate(0deg); z-index: 10; }

        .note-content { margin: 0; font-size: 1rem; line-height: 1.5; font-family: 'Indie Flower', cursive, sans-serif; }

        .note-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 10px;
        }

        /* Action Buttons */
        .action-link { text-decoration: none; font-size: 0.9rem; }
        .like-btn { color: #e91e63; font-weight: bold; }
        .delete-btn { color: #ccc; }
        .delete-btn:hover { color: #ff5252; }

        #quote-container { margin-top: 50px; display: none; padding: 20px; border-radius: 15px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>

    <div id="welcome-screen">
        <h1 style="font-size: 3rem; font-weight: 300; letter-spacing: 5px;">GENTLE SPACE</h1>
        <p style="opacity: 0.6;">A place for quiet gratitude.</p>
        <button class="enter-btn" style="background:transparent; color: var(--text);" onclick="enterSpace()">ENTER</button>
    </div>

    <div id="main-content">
        <div id="interaction-box" class="fadeIn">
            <h2 style="font-weight: 300; margin-bottom: 30px;">What are you grateful for today?</h2>
            <div class="input-container">
                <form method="POST">
                    {% csrf_token %}
                    <textarea name="content" placeholder="Share a small light..." required></textarea>
                    <button type="submit" class="submit-btn">Send into the world</button>
                </form>
            </div>
        </div>

        <div id="quote-container" class="fadeIn">
            <p id="quote-text" style="font-style: italic; color: var(--accent); font-size: 1.5rem;"></p>
            <a href="/" class="enter-btn" style="font-size: 0.8rem; border-color: #ddd;">Write another</a>
        </div>

        <div class="wall-grid">
            {% for post in posts %}
            <div class="note">
                <p class="note-content">{{ post.content }}</p>
                <div class="note-footer">
                    <a href="{% url 'like_post' post.id %}" class="action-link like-btn">❤️ {{ post.likes }}</a>
                    
                    <a href="{% url 'delete_post' post.id %}" class="action-link delete-btn" onclick="return confirm('Release this note forever?')">🗑️</a>
                </div>
            </div>
            {% empty %}
            <p style="grid-column: 1/-1; opacity: 0.5;">The wall is waiting for your light.</p>
            {% endfor %}
        </div>
    </div>

    <script>
        const quotes = [
            "Gratitude is the memory of the heart.",
            "Gratitude turns what we have into enough.",
            "Expect nothing, appreciate everything.",
            "The root of joy is gratefulness.",
            "There is always, always something to be thankful for."
        ];

        function enterSpace() {
            const ws = document.getElementById('welcome-screen');
            ws.style.opacity = '0';
            setTimeout(() => {
                ws.style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 1000);
        }

        window.onload = function() {
            if (new URLSearchParams(window.location.search).has('submitted')) {
                enterSpace();
                document.getElementById('interaction-box').style.display = 'none';
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById('quote-text').innerText = `"${randomQuote}"`;
                document.getElementById('quote-container').style.display = 'block';
            }
        }
    </script>
</body>
</html>
